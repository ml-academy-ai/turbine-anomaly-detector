services:
  app-stream-data:
    image: ${DOCKERHUB_USERNAME}/turbine-anomaly:latest
    command: ["python", "entrypoints/app_stream_data.py"]
    volumes:
      - ./data:/app/data
      - ./conf:/app/conf
    environment:
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped

  mlflow_server:
    image: ${DOCKERHUB_USERNAME}/turbine-anomaly:latest
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --backend-store-uri
      - sqlite:////app/mlflow/mlflow.db
      - --default-artifact-root
      - file:///app/mlflow/artifacts
      - --serve-artifacts
      - --allowed-hosts
      - "*"
      - --cors-allowed-origins
      - "*"
    ports:
      - "8080:8080"
    volumes:
      - mlflow_data:/app/mlflow
      - ./data:/app/data
      - ./conf:/app/conf
    restart: unless-stopped

  prefect-db:
    image: postgres:16
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - prefect_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect -d prefect"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  prefect-server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@prefect-db:5432/prefect
    depends_on:
      prefect-db:
        condition: service_healthy
    restart: unless-stopped

  app-ml-train:
    image: ${DOCKERHUB_USERNAME}/turbine-anomaly:latest
    command: ["python", "entrypoints/prefect/training.py"]
    restart: unless-stopped
    volumes:
      - mlflow_data:/app/mlflow
      - ./data:/app/data
      - ./conf:/app/conf
    environment:
      MLFLOW_TRACKING_URI: http://mlflow_server:8080
      PREFECT_API_URL: http://prefect-server:4200/api
    depends_on:
      - mlflow_server
      - app-stream-data
      - prefect-server

  app-ml-inference:
    image: ${DOCKERHUB_USERNAME}/turbine-anomaly:latest
    command: ["python", "entrypoints/prefect/inference.py"]
    restart: unless-stopped
    volumes:
      - mlflow_data:/app/mlflow
      - ./data:/app/data
      - ./conf:/app/conf
    environment:
      MLFLOW_TRACKING_URI: http://mlflow_server:8080
      PREFECT_API_URL: http://prefect-server:4200/api
    depends_on:
      - app-ml-train
      - mlflow_server
      - prefect-server

  app-ml-monitoring:
    image: ${DOCKERHUB_USERNAME}/turbine-anomaly:latest
    command: ["python", "entrypoints/prefect/monitoring.py"]
    restart: unless-stopped
    volumes:
      - mlflow_data:/app/mlflow
      - ./data:/app/data
      - ./conf:/app/conf
    environment:
      MLFLOW_TRACKING_URI: http://mlflow_server:8080
      PREFECT_API_URL: http://prefect-server:4200/api
    depends_on:
      - app-ml-train
      - mlflow_server
      - prefect-server

  app-ui:
    image: ${DOCKERHUB_USERNAME}/turbine-anomaly:latest
    command: ["python", "entrypoints/app_ui.py"]
    restart: unless-stopped
    ports:
      - "8050:8050"
    volumes:
      - mlflow_data:/app/mlflow
      - ./data:/app/data
      - ./conf:/app/conf
    environment:
      KEDRO_ENV: local
      MLFLOW_TRACKING_URI: http://mlflow_server:8080
      MLFLOW_UI_URI: ${MLFLOW_UI_URI:-http://localhost:8080}
      DEBUG: "False"
      KEDRO_VIZ_URI: ${KEDRO_VIZ_URI:-http://localhost:4141}
    depends_on:
      - mlflow_server
      - app-stream-data

  kedro-viz:
    image: ${DOCKERHUB_USERNAME}/turbine-anomaly:latest
    command: ["kedro", "viz", "run", "--host", "0.0.0.0", "--port", "4141", "--no-browser"]
    ports:
      - "4141:4141"
    depends_on:
      - app-ml-train
    restart: unless-stopped

volumes:
  mlflow_data: