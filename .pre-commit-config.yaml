repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.1
  hooks:
    # Run the linter.
    - id: ruff-check
      types_or: [ python, pyi ]
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
      types_or: [ python, pyi ]

- repo: local
  hooks:
    - id: ty-check
      name: ty check
      entry: uv run ty check src tests
      language: system
      types_or: [python, pyi]
      exclude: ^notebooks/
      pass_filenames: false
      
- repo: https://github.com/kynan/nbstripout
  rev: 0.7.1
  hooks:
      - id: nbstripout
