name: CD

on:
  workflow_run:
    workflows: ["CI"]  # must match your CI workflow name
    types: [completed] # completed does NOT mean successful.

env:
  IMAGE_NAME: turbine-anomaly

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Buildx enables advanced Docker builds (required for `docker buildx build --push`
      # and multi-platform images). Recommended for production CI/CD.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
            --push \
            .